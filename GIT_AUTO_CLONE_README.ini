---------------------------------------------------------------------------------------
Đây là lệnh tự CLONE repo trên GitHub về máy Advance version, có sử dụng giao thức SSH.
---------------------------------------------------------------------------------------

Khi hỏi "Use SSH clone? (y/N):"
		thì trả lời "yes" viết nguyên chữ thường.

				SSH clone là cách kết nối với GitHub qua giao thức SSH thay vì HTTPS.
						- Cần tạo SSH key và add vào GitHub
						- Sau khi cấu hình thì push/pull không cần nhập mật khẩu
						- Bảo mật hơn nếu dùng thường xuyên

				Khi nào nên dùng SSH clone?
						- Làm việc với GitHub thường xuyên, muốn tránh nhập password/token mỗi lần.
						- Máy tính cá nhân, đã cài SSH key an toàn.
						- Làm việc nhóm, CI/CD cần clone repo tự động.

				Khi nào nên dùng HTTPS clone?
						- Chưa cấu hình SSH key.
						- Chỉ cần clone repo nhanh để xem/test.
						- Không muốn setup thêm.

Sau đó tạo SSH key, mở Git bash hoặc CMD chạy lệnh sau:
		ssh-keygen -t ed25519 -C "your_email@example.com"

				Folder mặc định tạo file SSH là: "C:\Users\your-name\.ssh"
				Nó sẽ hiện như sau:
						"Generating public/private ed25519 key pair."
						"Enter file in which to save the key (/c/Users/your-name/.ssh/id_ed25519):"
								Nhấn Enter
						"Enter passphrase for "/c/Users/Dyour-namearra/.ssh/id_ed25519" (empty for no passphrase):"
								Nếu muốn không cần nhập mật khẩu mỗi lần dùng SSH key → Nhấn Enter để bỏ trống mật khẩu.
								Nếu muốn bảo mật hơn (dùng pass cho key) → nhập 1 mật khẩu rồi Enter → nhưng mỗi lần dùng key sẽ phải nhập pass đó.
						"Enter same passphrase again:"
								Nhấn Enter lần nữa để bỏ trống mật khẩu hoặc Nhập mật khẩu giống như trên 1 lần nữa rồi nhấn Enter

				Sau khi hoàn tất, nó sẽ tạo 2 file:
						"c/Users/your-name/.ssh/id_ed25519"
								Đây là private key (bí mật, không share)
						"c/Users/your-name/.ssh/id_ed25519.pub"
								Đây là public key (add lên GitHub)

Copy public key lên GitHub:
		Mở file .pub bằng Notepad và copy toàn bộ nội dung.
		Sau đó:
				Vào GitHub → Settings (trên avatar)
				SSH and GPG keys → New SSH key
				Title: ví dụ your-computer
				Paste nội dung .pub vào ô Key
				Save (hoặc nhấn Add SSH key)

Kiểm tra kết nối:
        ssh -T git@github.com
                Nếu thành công nó sẽ nói:
                "Hi your-name! You've successfully authenticated..."

	
